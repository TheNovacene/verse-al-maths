<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verse-al Maths · The Novacene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal-deep:    #1a4a4a;
      --teal-mid:     #2d7a7a;
      --teal-light:   #4db8b8;
      --amber:        #e8923a;
      --cream:        #faf6ef;
      --ink:          #1a2a2a;
      --muted:        #6a8a8a;
      --card-bg:      rgba(255,255,255,0.72);
      --radius:       16px;
      --transition:   0.35s cubic-bezier(0.4, 0, 0.2, 1);
      --wok-kw:       #4db8b8;
      --wok-dw:       #8b6bc4;
      --wok-hs:       #e8923a;
      --wok-es:       #5a9fd4;
      --wok-lb:       #5a7a5a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(45,122,122,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 80%, rgba(232,146,58,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 3rem 2rem 1.5rem;
      text-align: center;
    }

    .wordmark {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--teal-mid);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.1s forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 300;
      line-height: 1.1;
      color: var(--teal-deep);
      opacity: 0;
      animation: fadeUp 0.9s 0.2s forwards;
    }

    h1 em { font-style: italic; color: var(--amber); }

    .tagline {
      margin-top: 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      max-width: 540px;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.35s forwards;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--teal-light), var(--amber));
      margin: 1.5rem auto 0;
      border-radius: 2px;
      opacity: 0;
      animation: fadeUp 0.6s 0.5s forwards;
    }

    .view-toggle {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 1.5rem 0 0;
      opacity: 0;
      animation: fadeUp 0.6s 0.6s forwards;
    }

    .toggle-btn {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 50px;
      padding: 0.65rem 1.25rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all var(--transition);
    }

    .toggle-btn.active {
      background: var(--teal-light);
      color: white;
      border-color: var(--teal-light);
      box-shadow: 0 4px 16px rgba(77,184,184,0.2);
    }

    .toggle-btn:hover:not(.active) {
      background: rgba(255,255,255,0.8);
      color: var(--teal-mid);
    }

    .breadcrumb {
      display: none;
      position: relative;
      z-index: 10;
      padding: 0 2rem 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 1200px;
      margin: 0 auto;
    }

    .breadcrumb.visible { display: block; }

    .breadcrumb button {
      background: none;
      border: none;
      color: var(--teal-mid);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .breadcrumb button:hover { color: var(--amber); }

    main {
      position: relative;
      z-index: 5;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.55s forwards;
    }

    .topics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .topic-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: var(--radius);
      padding: 2rem;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.7s forwards;
      box-shadow: 0 2px 16px rgba(26,74,74,0.06);
    }

    .topic-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: var(--card-accent, var(--teal-light));
      border-radius: 4px 0 0 4px;
      transition: width var(--transition);
    }

    .topic-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(26,74,74,0.14); }
    .topic-card:hover::before { width: 6px; }

    .topic-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
      color: var(--card-accent, var(--teal-light));
      opacity: 0.25;
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      line-height: 1;
    }

    .topic-icon { font-size: 1.8rem; margin-bottom: 0.75rem; display: block; }

    .topic-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--teal-deep);
      margin-bottom: 0.4rem;
      line-height: 1.2;
    }

    .topic-count { font-size: 0.8rem; color: var(--muted); }

    .topic-seeds {
      margin-top: 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .topic-card[data-topic="1"] { --card-accent: #4db8b8; }
    .topic-card[data-topic="2"] { --card-accent: #5a9fd4; }
    .topic-card[data-topic="3"] { --card-accent: #e8923a; }
    .topic-card[data-topic="4"] { --card-accent: #8b6bc4; }
    .topic-card[data-topic="5"] { --card-accent: #5a7a5a; }
    .topic-card[data-topic="6"] { --card-accent: #c0392b; }
    .topic-card[data-topic="7"] { --card-accent: #d4a017; }

    .topic-card:nth-child(1) { animation-delay: 0.6s; }
    .topic-card:nth-child(2) { animation-delay: 0.7s; }
    .topic-card:nth-child(3) { animation-delay: 0.8s; }
    .topic-card:nth-child(4) { animation-delay: 0.9s; }
    .topic-card:nth-child(5) { animation-delay: 1.0s; }
    .topic-card:nth-child(6) { animation-delay: 1.1s; }
    .topic-card:nth-child(7) { animation-delay: 1.2s; }

    #lessons-view { display: none; }
    #lessons-view.visible { display: block; }
    #wok-view { display: none; }
    #wok-view.visible { display: block; }
    #topics-view.hidden { display: none; }

    .lessons-header {
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s forwards;
    }

    .lessons-topic-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 300;
      color: var(--teal-deep);
      margin-bottom: 0.25rem;
    }

    .lessons-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--muted);
      font-size: 1rem;
    }

    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .lesson-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 12px;
      padding: 0;
      color: inherit;
      display: block;
      transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 2px 12px rgba(26,74,74,0.05);
      opacity: 0;
      animation: fadeUp 0.5s forwards;
      overflow: hidden;
    }

    .lesson-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(26,74,74,0.12); }

    .lesson-link {
      display: block;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
    }

    .lesson-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--teal-deep);
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .open-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 0.75rem;
    }

    .open-label::after { content: '→'; transition: transform var(--transition); }
    .lesson-card:hover .open-label::after { transform: translateX(4px); }

    .activities-list {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0.75rem 1.5rem 1rem;
      border-top: 1px solid rgba(26,74,74,0.08);
    }

    .activity-link {
      font-size: 0.85rem;
      color: var(--teal-mid);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      transition: all var(--transition);
    }

    .activity-link:hover {
      background: rgba(77,184,184,0.1);
      color: var(--teal-deep);
    }

    .wok-badges {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-left: auto;
    }

    .wok-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.3rem 0.6rem;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 500;
      color: white;
      line-height: 1;
    }

    .wok-badge.kw { background-color: var(--wok-kw); }
    .wok-badge.dw { background-color: var(--wok-dw); }
    .wok-badge.hs { background-color: var(--wok-hs); }
    .wok-badge.es { background-color: var(--wok-es); }
    .wok-badge.lb { background-color: var(--wok-lb); }

    .lesson-card:nth-child(1)  { animation-delay: 0.1s; }
    .lesson-card:nth-child(2)  { animation-delay: 0.15s; }
    .lesson-card:nth-child(3)  { animation-delay: 0.2s; }
    .lesson-card:nth-child(4)  { animation-delay: 0.25s; }
    .lesson-card:nth-child(5)  { animation-delay: 0.3s; }
    .lesson-card:nth-child(6)  { animation-delay: 0.35s; }
    .lesson-card:nth-child(7)  { animation-delay: 0.4s; }
    .lesson-card:nth-child(8)  { animation-delay: 0.45s; }
    .lesson-card:nth-child(9)  { animation-delay: 0.5s; }
    .lesson-card:nth-child(10) { animation-delay: 0.55s; }
    .lesson-card:nth-child(11) { animation-delay: 0.6s; }
    .lesson-card:nth-child(12) { animation-delay: 0.65s; }
    .lesson-card:nth-child(13) { animation-delay: 0.7s; }
    .lesson-card:nth-child(14) { animation-delay: 0.75s; }
    .lesson-card:nth-child(15) { animation-delay: 0.8s; }
    .lesson-card:nth-child(16) { animation-delay: 0.85s; }
    .lesson-card:nth-child(17) { animation-delay: 0.9s; }
    .lesson-card:nth-child(18) { animation-delay: 0.95s; }

    .wok-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .wok-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: var(--radius);
      padding: 2rem;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.7s forwards;
      box-shadow: 0 2px 16px rgba(26,74,74,0.06);
    }

    .wok-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: var(--wok-accent, var(--teal-light));
      border-radius: 4px 0 0 4px;
      transition: width var(--transition);
    }

    .wok-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(26,74,74,0.14); }
    .wok-card:hover::before { width: 6px; }

    .wok-icon { font-size: 2rem; margin-bottom: 0.75rem; display: block; }

    .wok-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--teal-deep);
      margin-bottom: 0.25rem;
      line-height: 1.2;
    }

    .wok-count { font-size: 0.8rem; color: var(--muted); }

    .wok-card[data-wok="kw"] { --wok-accent: var(--wok-kw); }
    .wok-card[data-wok="dw"] { --wok-accent: var(--wok-dw); }
    .wok-card[data-wok="hs"] { --wok-accent: var(--wok-hs); }
    .wok-card[data-wok="es"] { --wok-accent: var(--wok-es); }
    .wok-card[data-wok="lb"] { --wok-accent: var(--wok-lb); }

    .wok-card:nth-child(1) { animation-delay: 0.6s; }
    .wok-card:nth-child(2) { animation-delay: 0.7s; }
    .wok-card:nth-child(3) { animation-delay: 0.8s; }
    .wok-card:nth-child(4) { animation-delay: 0.9s; }
    .wok-card:nth-child(5) { animation-delay: 1.0s; }

    .wok-details {
      display: none;
      padding: 2rem;
    }

    .wok-details.visible { display: block; }

    .wok-details h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--teal-deep);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s forwards;
    }

    .topic-section {
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.6s forwards;
    }

    .topic-section:nth-child(2) { animation-delay: 0.15s; }
    .topic-section:nth-child(3) { animation-delay: 0.2s; }
    .topic-section:nth-child(4) { animation-delay: 0.25s; }
    .topic-section:nth-child(5) { animation-delay: 0.3s; }
    .topic-section:nth-child(6) { animation-delay: 0.35s; }
    .topic-section:nth-child(7) { animation-delay: 0.4s; }
    .topic-section:nth-child(8) { animation-delay: 0.45s; }

    .topic-section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.85rem;
    }

    .activities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    .activity-card {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 10px;
      padding: 1.25rem;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all var(--transition);
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.4;
    }

    .activity-card:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.8);
      box-shadow: 0 6px 20px rgba(26,74,74,0.1);
    }

    .activity-card-title {
      color: var(--teal-mid);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .activity-card-wok {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.3rem;
      margin-top: 0.5rem;
    }

    footer {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 2rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--muted);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      header { padding: 2rem 1.25rem 1rem; }
      main   { padding: 0 1.25rem 3rem; }
      .topics-grid, .lessons-grid, .wok-grid, .activities-grid { grid-template-columns: 1fr; }
      .view-toggle { margin: 1rem 0 0; }
    }
  </style>
</head>
<body>

  <header>
    <p class="wordmark">The Novacene · Verse-al Maths</p>
    <h1>Mathematics for<br /><em>curious minds</em></h1>
    <p class="tagline">A curriculum that begins with who you are, not what you don't know yet.</p>
    <div class="view-toggle" id="view-toggle">
      <button class="toggle-btn active" onclick="switchView('topic')">By Topic</button>
      <button class="toggle-btn" onclick="switchView('wok')">By Way of Knowing</button>
    </div>
    <div class="divider"></div>
  </header>

  <div class="breadcrumb" id="breadcrumb">
    <button onclick="showTopics()">← All topics</button>
    <span id="breadcrumb-topic"></span>
  </div>

  <main>
    <div id="topics-view">
      <p class="section-label">Choose your starting point</p>
      <div class="topics-grid" id="topics-grid"></div>
    </div>
    <div id="lessons-view">
      <div class="lessons-header">
        <h2 class="lessons-topic-name" id="lessons-topic-name"></h2>
        <p class="lessons-subtitle" id="lessons-subtitle"></p>
      </div>
      <div class="lessons-grid" id="lessons-grid"></div>
    </div>
    <div id="wok-view">
      <div class="wok-grid" id="wok-grid"></div>
      <div class="wok-details" id="wok-details"></div>
    </div>
  </main>

  <footer>
    <p>I am not finished, I am forming — each question a contour of my becoming.</p>
  </footer>

    function titleCase(slug) {
      // Remove version suffix
      let text = slug.replace(/-v2$/,'');

      // Handle mathematical notation (equations with = and +)
      if (text.includes('=')) {
        // Split by = and handle both sides
        let parts = text.split('=');
        let result = parts.map(part => {
          // Remove hyphens around operators, but preserve the operators
          let cleaned = part.replace(/^-/, '').replace(/-$/, '');
          return cleaned;
        }).join(' = ');

        // Add spaces around mathematical operators
        result = result.replace(/([+\-*\/])/g, ' $1 ');

        // Clean up multiple spaces
        result = result.replace(/\s+/g, ' ').trim();

        return result;
      }

      // Standard title case for normal words
      text = text.replace(/-/g,' ')
        .replace(/\b\w/g, c => c.toUpperCase())
        .replace(/\bAnd\b/g,'and').replace(/\bOf\b/g,'of')
        .replace(/\bThe\b/g,'the').replace(/\bIn\b/g,'in')
        .replace(/^./,c => c.toUpperCase());

      return text;
    }

    function getActivitiesForLesson(lessonSlug, topicFolder) {
      const topicActivities = activities[topicFolder] || [];
      return topicActivities.filter(act => {
        const actBase = act.base.toLowerCase();
        const lessonBase = lessonSlug.replace(/-v2$/,'').toLowerCase();
        return lessonBase.includes(actBase) || actBase.includes(lessonBase);
      });
    }

    function createWokBadge(wokCode) {
      const info = wokInfo[wokCode];
      return `<span class="wok-badge ${wokCode}" title="${info.name}">${info.emoji} ${wokCode.toUpperCase()}</span>`;
    }

    function renderTopics() {
      const grid = document.getElementById('topics-grid');
      grid.innerHTML = '';
      topics.forEach(t => {
        const card = document.createElement('div');
        card.className = 'topic-card';
        card.dataset.topic = t.id;
        card.innerHTML = `
          <span class="topic-number">${String(t.id).padStart(2,'0')}</span>
          <span class="topic-icon">${t.icon}</span>
          <div class="topic-name">${t.name}</div>
          <div class="topic-count">${t.lessons.length} lessons</div>
          <p class="topic-seeds">${t.seed}</p>`;
        card.addEventListener('click', () => showLessons(t));
        grid.appendChild(card);
      });
    }

    function showLessons(topic) {
      document.getElementById('lessons-topic-name').textContent = topic.name;
      document.getElementById('lessons-subtitle').textContent = topic.seed;
      const bc = document.getElementById('breadcrumb');
      bc.classList.add('visible');
      document.getElementById('breadcrumb-topic').textContent = ` / ${topic.name}`;
      const grid = document.getElementById('lessons-grid');
      grid.innerHTML = '';
      topic.lessons.forEach(slug => {
        const card = document.createElement('div');
        card.className = 'lesson-card';

        const lessonActivities = getActivitiesForLesson(slug, topic.folder);
        const activitiesHTML = lessonActivities.length > 0
          ? `<div class="activities-list">${lessonActivities.map(act => {
              return `<a href="/verse-al-maths/lessons/${topic.folder}/${act.file}.html" target="_blank" rel="noopener" class="activity-link">
                Activity ${act.num} · ${titleCase(act.base)}
                <div class="wok-badges">${createWokBadge(act.wok)}</div>
              </a>`;
            }).join('')}</div>`
          : '';

        card.innerHTML = `
          <a href="/verse-al-maths/lessons/${topic.folder}/${slug}.html" target="_blank" rel="noopener" class="lesson-link">
            <div class="lesson-title">${titleCase(slug)}</div>
            <div class="open-label">Open lesson</div>
          </a>
          ${activitiesHTML}`;
        grid.appendChild(card);
      });
      document.getElementById('topics-view').classList.add('hidden');
      document.getElementById('lessons-view').classList.add('visible');
      document.getElementById('wok-view').classList.remove('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showTopics() {
      document.getElementById('topics-view').classList.remove('hidden');
      document.getElementById('lessons-view').classList.remove('visible');
      document.getElementById('wok-view').classList.remove('visible');
      document.getElementById('breadcrumb').classList.remove('visible');
      switchView('topic');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function switchView(view) {
      const topicBtn = document.querySelectorAll('.toggle-btn')[0];
      const wokBtn = document.querySelectorAll('.toggle-btn')[1];

      if (view === 'topic') {
        topicBtn.classList.add('active');
        wokBtn.classList.remove('active');
        document.getElementById('topics-view').classList.remove('hidden');
        document.getElementById('wok-view').classList.remove('visible');
        if (!document.getElementById('lessons-view').classList.contains('visible')) {
          document.getElementById('breadcrumb').classList.remove('visible');
        }
      } else {
        topicBtn.classList.remove('active');
        wokBtn.classList.add('active');
        document.getElementById('topics-view').classList.add('hidden');
        document.getElementById('lessons-view').classList.remove('visible');
        document.getElementById('wok-view').classList.add('visible');
        document.getElementById('breadcrumb').classList.remove('visible');
        renderWoKView();
      }
    }

    function renderWoKView() {
      const grid = document.getElementById('wok-grid');
      grid.innerHTML = '';
      const wokKeys = ['kw', 'dw', 'hs', 'es', 'lb'];

      wokKeys.forEach((key, idx) => {
        const info = wokInfo[key];
        const card = document.createElement('div');
        card.className = 'wok-card';
        card.dataset.wok = key;
        card.innerHTML = `
          <span class="wok-icon">${info.emoji}</span>
          <div class="wok-name">${info.name}</div>
          <div class="wok-count" id="wok-count-${key}"></div>`;
        card.addEventListener('click', () => showWoKDetails(key));
        grid.appendChild(card);
      });

      updateWoKCounts();
    }

    function updateWoKCounts() {
      const wokKeys = ['kw', 'dw', 'hs', 'es', 'lb'];
      wokKeys.forEach(key => {
        let count = 0;
        Object.values(activities).forEach(topicActivities => {
          topicActivities.forEach(act => {
            if (act.wok === key) count++;
          });
        });
        document.getElementById(`wok-count-${key}`).textContent = `${count} activities`;
      });
    }

    function showWoKDetails(wokKey) {
      const info = wokInfo[wokKey];
      const detailsDiv = document.getElementById('wok-details');
      detailsDiv.classList.add('visible');

      // Organize activities by topic
      const activitiesByTopic = {};
      topics.forEach(t => {
        activitiesByTopic[t.name] = [];
      });

      const topicMap = {};
      topics.forEach(t => {
        topicMap[t.folder] = t.name;
      });

      Object.entries(activities).forEach(([folder, acts]) => {
        const topicName = topicMap[folder];
        if (topicName) {
          acts.forEach(act => {
            if (act.wok === wokKey) {
              activitiesByTopic[topicName].push({ ...act, folder });
            }
          });
        }
      });

      let html = `<h3>${info.emoji} ${info.name}</h3>`;

      Object.entries(activitiesByTopic).forEach(([topicName, acts]) => {
        if (acts.length > 0) {
          html += `<div class="topic-section">
            <div class="topic-section-title">${topicName}</div>
            <div class="activities-grid">`;

          acts.forEach(act => {
            html += `<a href="/verse-al-maths/lessons/${act.folder}/${act.file}.html" target="_blank" rel="noopener" class="activity-card">
              <div class="activity-card-title">${titleCase(act.base)} Activity ${act.num}</div>
              <div class="activity-card-wok">${createWokBadge(act.wok)}</div>
            </a>`;
          });

          html += `</div></div>`;
        }
      });

      detailsDiv.innerHTML = html;
    }

    renderTopics();
