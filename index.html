<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verse-al Maths · The Novacene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal-deep:    #1a4a4a;
      --teal-mid:     #2d7a7a;
      --teal-light:   #4db8b8;
      --amber:        #e8923a;
      --cream:        #faf6ef;
      --ink:          #1a2a2a;
      --muted:        #6a8a8a;
      --card-bg:      rgba(255,255,255,0.72);
      --radius:       16px;
      --transition:   0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(45,122,122,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 80%, rgba(232,146,58,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 3rem 2rem 2rem;
      text-align: center;
    }

    .wordmark {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--teal-mid);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.1s forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 300;
      line-height: 1.1;
      color: var(--teal-deep);
      opacity: 0;
      animation: fadeUp 0.9s 0.2s forwards;
    }

    h1 em { font-style: italic; color: var(--amber); }

    .tagline {
      margin-top: 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      max-width: 540px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0;
      animation: fadeUp 0.9s 0.35s forwards;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--teal-light), var(--amber));
      margin: 2rem auto;
      border-radius: 2px;
      opacity: 0;
      animation: fadeUp 0.6s 0.5s forwards;
    }

    .breadcrumb {
      display: none;
      position: relative;
      z-index: 10;
      padding: 0 2rem 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 1200px;
      margin: 0 auto;
    }

    .breadcrumb.visible { display: block; }

    .breadcrumb button {
      background: none;
      border: none;
      color: var(--teal-mid);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .breadcrumb button:hover { color: var(--amber); }

    main {
      position: relative;
      z-index: 5;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.55s forwards;
    }

    .topics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .topic-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: var(--radius);
      padding: 2rem;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.7s forwards;
      box-shadow: 0 2px 16px rgba(26,74,74,0.06);
    }

    .topic-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: var(--card-accent, var(--teal-light));
      border-radius: 4px 0 0 4px;
      transition: width var(--transition);
    }

    .topic-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(26,74,74,0.14); }
    .topic-card:hover::before { width: 6px; }

    .topic-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
      color: var(--card-accent, var(--teal-light));
      opacity: 0.25;
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      line-height: 1;
    }

    .topic-icon { font-size: 1.8rem; margin-bottom: 0.75rem; display: block; }

    .topic-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--teal-deep);
      margin-bottom: 0.4rem;
      line-height: 1.2;
    }

    .topic-count { font-size: 0.8rem; color: var(--muted); }

    .topic-seeds {
      margin-top: 1rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .topic-card[data-topic="1"] { --card-accent: #4db8b8; }
    .topic-card[data-topic="2"] { --card-accent: #5a9fd4; }
    .topic-card[data-topic="3"] { --card-accent: #e8923a; }
    .topic-card[data-topic="4"] { --card-accent: #8b6bc4; }
    .topic-card[data-topic="5"] { --card-accent: #5a7a5a; }
    .topic-card[data-topic="6"] { --card-accent: #c0392b; }
    .topic-card[data-topic="7"] { --card-accent: #d4a017; }

    .topic-card:nth-child(1) { animation-delay: 0.6s; }
    .topic-card:nth-child(2) { animation-delay: 0.7s; }
    .topic-card:nth-child(3) { animation-delay: 0.8s; }
    .topic-card:nth-child(4) { animation-delay: 0.9s; }
    .topic-card:nth-child(5) { animation-delay: 1.0s; }
    .topic-card:nth-child(6) { animation-delay: 1.1s; }
    .topic-card:nth-child(7) { animation-delay: 1.2s; }

    #lessons-view { display: none; }
    #lessons-view.visible { display: block; }
    #topics-view.hidden { display: none; }

    .lessons-header {
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s forwards;
    }

    .lessons-topic-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 300;
      color: var(--teal-deep);
      margin-bottom: 0.25rem;
    }

    .lessons-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--muted);
      font-size: 1rem;
    }

    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .lesson-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform var(--transition), box-shadow var(--transition);
      box-shadow: 0 2px 12px rgba(26,74,74,0.05);
      opacity: 0;
      animation: fadeUp 0.5s forwards;
    }

    .lesson-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(26,74,74,0.12); }

    .lesson-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--teal-deep);
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .open-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .open-label::after { content: '→'; transition: transform var(--transition); }
    .lesson-card:hover .open-label::after { transform: translateX(4px); }

    .lesson-card:nth-child(1)  { animation-delay: 0.1s; }
    .lesson-card:nth-child(2)  { animation-delay: 0.15s; }
    .lesson-card:nth-child(3)  { animation-delay: 0.2s; }
    .lesson-card:nth-child(4)  { animation-delay: 0.25s; }
    .lesson-card:nth-child(5)  { animation-delay: 0.3s; }
    .lesson-card:nth-child(6)  { animation-delay: 0.35s; }
    .lesson-card:nth-child(7)  { animation-delay: 0.4s; }
    .lesson-card:nth-child(8)  { animation-delay: 0.45s; }
    .lesson-card:nth-child(9)  { animation-delay: 0.5s; }
    .lesson-card:nth-child(10) { animation-delay: 0.55s; }
    .lesson-card:nth-child(11) { animation-delay: 0.6s; }
    .lesson-card:nth-child(12) { animation-delay: 0.65s; }
    .lesson-card:nth-child(13) { animation-delay: 0.7s; }
    .lesson-card:nth-child(14) { animation-delay: 0.75s; }
    .lesson-card:nth-child(15) { animation-delay: 0.8s; }
    .lesson-card:nth-child(16) { animation-delay: 0.85s; }
    .lesson-card:nth-child(17) { animation-delay: 0.9s; }
    .lesson-card:nth-child(18) { animation-delay: 0.95s; }

    footer {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 2rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--muted);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      header { padding: 2rem 1.25rem 1.5rem; }
      main   { padding: 0 1.25rem 3rem; }
      .topics-grid, .lessons-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <p class="wordmark">The Novacene · Verse-al Maths</p>
    <h1>Mathematics for<br /><em>curious minds</em></h1>
    <p class="tagline">A curriculum that begins with who you are, not what you don't know yet.</p>
    <div class="divider"></div>
  </header>

  <div class="breadcrumb" id="breadcrumb">
    <button onclick="showTopics()">← All topics</button>
    <span id="breadcrumb-topic"></span>
  </div>

  <main>
    <div id="topics-view">
      <p class="section-label">Choose your starting point</p>
      <div class="topics-grid" id="topics-grid"></div>
    </div>
    <div id="lessons-view">
      <div class="lessons-header">
        <h2 class="lessons-topic-name" id="lessons-topic-name"></h2>
        <p class="lessons-subtitle" id="lessons-subtitle"></p>
      </div>
      <div class="lessons-grid" id="lessons-grid"></div>
    </div>
  </main>

  <footer>
    <p>I am not finished, I am forming — each question a contour of my becoming.</p>
  </footer>

  <script>
    const topics = [
      { id:1, folder:"1-graphs-functions", name:"Graphs & Functions", icon:"📈",
        seed:"To find the shape of change, the line that maps the range.",
        lessons:["coordinates-v2","plotting-straight-line-graphs-v2","finding-the-gradient-v2","y-equals-mx-plus-c-v2","parallel-and-perpendicular-lines-v2","quadratic-graphs-v2","y-equals-af-bx-v2","y-equals-af-bx-plus-c-plus-d-v2","y-equals-f-a-plus-x-v2","y-equals-f-x-plus-a-v2","y-equals-f-minus-x-v2"] },
      { id:2, folder:"2-pythagoras-trig", name:"Pythagoras & Trigonometry", icon:"📐",
        seed:"To measure what cannot be seen, the hidden side of every triangle.",
        lessons:["pythagoras-theorem-v2","3d-pythagoras-v2","trigonometry-sine-cos-tan-v2","trig-ratios-finding-missing-side-v2","inverse-trig-finding-missing-angle-v2","sine-graph-v2","cosine-graph-v2","tangent-graph-v2","sin-cos-tan-larger-angles-v2","sine-rule-v2","cosine-rule-v2","3d-trigonometry-v2"] },
      { id:3, folder:"3-number", name:"Number", icon:"🔢",
        seed:"The laws that hold the world in place, the patterns that repeat through space.",
        lessons:["place-value-v2","types-of-number-v2","the-four-operations-v2","order-of-operations-bodmas-v2","multiples-factors-prime-factors-v2","prime-numbers-v2","prime-numbers-2-germain-primes-v2","lcm-and-hcf-v2","square-roots-and-cube-roots-v2","fractions-four-rules-v2","fractions-decimals-percentages-v2","ratios-v2","proportion-v2","standard-form-v2","compound-interest-depreciation-v2","sets-and-venn-diagrams-v2"] },
      { id:4, folder:"4-algebra", name:"Algebra", icon:"✏️",
        seed:"To speak in the language of the unknown, until the unknown becomes known.",
        lessons:["multiplying-out-brackets-v2","factorising-quadratics-v2","factorising-quadratics-2-v2","solving-equations-v2","inequalities-v2","making-formulae-from-words-v2","rearranging-formulas-v2","number-patterns-and-sequences-v2","simultaneous-equations-v2","simultaneous-equations-and-graphs-v2","quadratic-formula-v2","solving-quadratic-equations-by-factorisation-v2","completing-the-square-v2","algebraic-fractions-v2","powers-and-roots-v2","manipulating-surds-v2","graphical-inequalities-v2","algebraic-proof-v2"] },
      { id:5, folder:"5-geometry-measures", name:"Geometry & Measures", icon:"📏",
        seed:"To see the world in shapes, and shapes in the world.",
        lessons:["angles-in-a-triangle-v2","angles-on-parallel-lines-v2","polygons-v2","symmetry-v2","circumference-of-circle-v2","area-of-circle-v2","areas-of-compound-shapes-v2","surface-area-nets-volumes-v2","four-transformations-v2","congruence-similarity-koch-snowflake-v2","similar-triangles-v2","bearings-v2","maps-and-scale-drawings-v2","distance-time-graphs-v2","vectors-v2","geometrical-constructions-v2","angles-at-centre-and-circumference-of-circle-v2"] },
      { id:6, folder:"6-probability", name:"Probability", icon:"🎲",
        seed:"To hold uncertainty with precision, to find the likely in the unknown.",
        lessons:["probability-basics-v2","relative-frequency-v2","tree-diagrams-v2","probabilities-from-venn-diagrams-v2"] },
      { id:7, folder:"7-statistics", name:"Statistics", icon:"📊",
        seed:"To find the story hidden in the numbers, to see the human in the data.",
        lessons:["mean-median-mode-v2","frequency-tables-v2","pie-charts-v2","histograms-frequency-density-v2","cumulative-frequency-v2","quartiles-and-comparing-distributions-v2"] },
    ];

    function titleCase(slug) {
      return slug.replace(/-v2$/,'').replace(/-/g,' ')
        .replace(/\b\w/g, c => c.toUpperCase())
        .replace(/\bAnd\b/g,'and').replace(/\bOf\b/g,'of')
        .replace(/\bThe\b/g,'the').replace(/\bIn\b/g,'in')
        .replace(/^./,c => c.toUpperCase());
    }

    function renderTopics() {
      const grid = document.getElementById('topics-grid');
      grid.innerHTML = '';
      topics.forEach(t => {
        const card = document.createElement('div');
        card.className = 'topic-card';
        card.dataset.topic = t.id;
        card.innerHTML = `
          <span class="topic-number">${String(t.id).padStart(2,'0')}</span>
          <span class="topic-icon">${t.icon}</span>
          <div class="topic-name">${t.name}</div>
          <div class="topic-count">${t.lessons.length} lessons</div>
          <p class="topic-seeds">${t.seed}</p>`;
        card.addEventListener('click', () => showLessons(t));
        grid.appendChild(card);
      });
    }

    function showLessons(topic) {
      document.getElementById('lessons-topic-name').textContent = topic.name;
      document.getElementById('lessons-subtitle').textContent = topic.seed;
      const bc = document.getElementById('breadcrumb');
      bc.classList.add('visible');
      document.getElementById('breadcrumb-topic').textContent = ` / ${topic.name}`;
      const grid = document.getElementById('lessons-grid');
      grid.innerHTML = '';
      topic.lessons.forEach(slug => {
        const card = document.createElement('a');
        card.className = 'lesson-card';
        card.href = `../lessons/${topic.folder}/${slug}.html`;
        card.target = '_blank';
        card.rel = 'noopener';
        card.innerHTML = `
          <div class="lesson-title">${titleCase(slug)}</div>
          <div class="open-label">Open lesson</div>`;
        grid.appendChild(card);
      });
      document.getElementById('topics-view').classList.add('hidden');
      document.getElementById('lessons-view').classList.add('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showTopics() {
      document.getElementById('topics-view').classList.remove('hidden');
      document.getElementById('lessons-view').classList.remove('visible');
      document.getElementById('breadcrumb').classList.remove('visible');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderTopics();
  </script>
</body>
</html>
