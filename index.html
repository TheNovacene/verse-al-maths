<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nudge Match — Prototype v0.1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #FAF8F4; color: #2C3E3E; -webkit-font-smoothing: antialiased; }
    .fr { font-family: 'Fraunces', serif; }
    textarea { font-family: 'DM Sans', sans-serif; }
    button { font-family: 'DM Sans', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
    @keyframes pop { from { opacity:0; transform:scale(0.93); } to { opacity:1; transform:scale(1); } }
    .fu { animation: fadeUp .35s ease forwards; }
    .pop { animation: pop .25s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ── Tokens ──────────────────────────────────────────────────────────────
    const T = {
      teal:"#1A6B6B", tealL:"#2A8A8A", tealXL:"#E4F0F0",
      cream:"#FAF8F4", sand:"#F0EBE1", coral:"#E8674A",
      amber:"#F0A84E", green:"#4CAF7A", slate:"#2C3E3E",
      muted:"#7A9090", white:"#FFFFFF", border:"#D8E8E8",
    };

    // ── Mock data ────────────────────────────────────────────────────────────
    const PRACTITIONERS = [
      { id:"p1", name:"Marcus", initial:"M", colour:"#4A7C7C",
        tagline:"Outdoors, music, and a calm presence.",
        specialisms:["ADHD","Anxiety","SEMH"],
        interests:["music","outdoors","cooking","sport"],
        cornerstones:{Connection:5,Movement:5,Creativity:4,Reflection:3,Rest:4,Nutrition:3},
        locations:["home","outdoors","community"], style:"patient",
        bio:"Marcus has 4 years with Nudge. He's calm, practical, and loves getting outside. He has a particular gift for building trust slowly — no rush, no pressure.",
        compliance:{dbs:"✓",safeguarding:"✓",cpi:"✓",online:"Yes"},
        region:"North East", availHours:12, matchScore:94,
        testimonial:'"Marcus never made me feel like a problem to fix. He just showed up." — young person, 2025' },
      { id:"p2", name:"Priya", initial:"P", colour:"#7A6B4A",
        tagline:"Creative arts, reflection, and honest conversation.",
        specialisms:["PDA","Autism","Complex needs"],
        interests:["art","film","gaming","animals"],
        cornerstones:{Connection:4,Movement:3,Creativity:5,Reflection:5,Rest:4,Nutrition:3},
        locations:["home","online","library"], style:"creative",
        bio:"Priya brings 6 years' experience working alongside young people with PDA and autistic profiles. She's patient, creative, and follows the young person's lead completely.",
        compliance:{dbs:"✓",safeguarding:"✓",cpi:"✓",online:"Yes"},
        region:"Yorkshire", availHours:8, matchScore:87,
        testimonial:'"Priya actually listened. She didn\'t pretend she had all the answers." — parent, 2025' },
      { id:"p3", name:"Dev", initial:"D", colour:"#5A4A7C",
        tagline:"Sport, routine, and earning trust one step at a time.",
        specialisms:["ADHD","Trauma","EAL"],
        interests:["sport","cooking","film","outdoors"],
        cornerstones:{Connection:4,Movement:5,Creativity:3,Reflection:3,Rest:3,Nutrition:5},
        locations:["community","park","home"], style:"funny",
        bio:"Dev is energetic, consistent, and has a quiet knack for meeting young people exactly where they are. Brilliant for young people who find sitting still hard.",
        compliance:{dbs:"✓",safeguarding:"✓",cpi:"✓",online:"No"},
        region:"North East", availHours:16, matchScore:79,
        testimonial:'"He made me laugh on the worst day. That mattered." — young person, 2024' },
    ];

    const INTERESTS  = [{id:"music",label:"Music",e:"🎵"},{id:"art",label:"Art",e:"🎨"},{id:"gaming",label:"Gaming",e:"🎮"},{id:"outdoors",label:"Outdoors",e:"🌿"},{id:"sport",label:"Sport",e:"⚽"},{id:"cooking",label:"Cooking",e:"🍳"},{id:"animals",label:"Animals",e:"🐾"},{id:"film",label:"Film",e:"🎬"}];
    const LOCATIONS  = [{id:"home",label:"At home",e:"🏠"},{id:"outdoors",label:"Outside",e:"🌳"},{id:"community",label:"In the community",e:"☕"},{id:"online",label:"Online",e:"💻"},{id:"library",label:"Library/café",e:"📚"},{id:"park",label:"Park",e:"🌸"}];
    const STYLES     = [{id:"patient",label:"Calm and patient",e:"🌊"},{id:"funny",label:"Funny and chatty",e:"😄"},{id:"creative",label:"Creative",e:"✨"},{id:"quiet",label:"Quiet — not pushy",e:"🌙"},{id:"sporty",label:"Active and sporty",e:"🏃"},{id:"unsure",label:"Not sure yet",e:"🤷"}];
    const CHALLENGES = [{id:"school",label:"School feels impossible",e:"🏫"},{id:"anxiety",label:"Anxiety",e:"😰"},{id:"trust",label:"Hard to trust people",e:"🔒"},{id:"focus",label:"Focusing",e:"🌀"},{id:"lonely",label:"Feeling lonely",e:"💙"},{id:"unsure",label:"Not sure yet",e:"❓"}];

    // ── Shared UI ────────────────────────────────────────────────────────────
    const Badge = ({children, colour=T.teal}) =>
      <span style={{padding:"3px 10px",borderRadius:999,fontSize:12,fontWeight:600,background:colour+"22",color:colour}}>{children}</span>;

    const Btn = ({children,onClick,variant="primary",disabled,small}) => {
      const p = variant==="primary";
      return <button onClick={onClick} disabled={disabled} style={{
        padding:small?"8px 18px":"11px 24px", borderRadius:999,
        cursor:disabled?"default":"pointer", fontWeight:600,
        fontSize:small?13:15, transition:"all .2s",
        border:p?"none":`2px solid ${T.teal}`,
        background:disabled?T.border:p?T.teal:T.white,
        color:disabled?T.muted:p?T.white:T.teal,
        opacity:disabled?.6:1,
        boxShadow:p&&!disabled?"0 4px 14px rgba(26,107,107,.25)":"none",
      }}>{children}</button>;
    };

    const Card = ({children,style,onClick,hoverable}) =>
      <div onClick={onClick}
        onMouseEnter={e=>hoverable&&(e.currentTarget.style.boxShadow="0 6px 20px rgba(26,107,107,.13)")}
        onMouseLeave={e=>hoverable&&(e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,.04)")}
        style={{background:T.white,borderRadius:14,border:`1px solid ${T.border}`,padding:20,
          transition:"all .2s",cursor:hoverable?"pointer":"default",
          boxShadow:"0 2px 8px rgba(0,0,0,.04)",...style}}>
        {children}
      </div>;

    const Avatar = ({initial,colour,size=44}) =>
      <div style={{width:size,height:size,borderRadius:"50%",background:colour||T.teal,
        color:T.white,display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:size*.38,fontWeight:700,flexShrink:0,fontFamily:"'Fraunces',serif"}}>
        {initial}
      </div>;

    const Dots = ({total,current}) =>
      <div style={{display:"flex",gap:6,justifyContent:"center",margin:"12px 0"}}>
        {Array.from({length:total}).map((_,i) =>
          <div key={i} style={{width:7,height:7,borderRadius:999,transition:"all .3s",
            background:i===current?T.teal:T.border,
            transform:i===current?"scale(1.5)":"scale(1)"}}/>)}
      </div>;

    const Bar = ({label,value}) =>
      <div style={{marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
          <span style={{color:T.muted}}>{label}</span>
          <span style={{color:T.teal,fontWeight:600}}>{value}/5</span>
        </div>
        <div style={{height:5,borderRadius:999,background:T.tealXL}}>
          <div style={{height:5,borderRadius:999,background:T.teal,width:`${value/5*100}%`}}/>
        </div>
      </div>;

    const Score = ({score}) =>
      <div style={{textAlign:"center",flexShrink:0}}>
        <div style={{fontSize:24,fontWeight:700,color:score>90?T.green:score>80?T.amber:T.coral}}>{score}%</div>
        <div style={{fontSize:10,color:T.muted}}>coherence</div>
      </div>;

    const Back = ({onClick}) =>
      <button onClick={onClick} style={{background:"none",border:"none",cursor:"pointer",
        color:T.muted,fontSize:13,marginBottom:18,padding:0}}>← Back</button>;

    const Lbl = ({children}) =>
      <div style={{fontSize:11,color:T.muted,fontWeight:600,textTransform:"uppercase",
        letterSpacing:".05em",marginBottom:6}}>{children}</div>;

    const Chip = ({children,active,onClick,ac,ab}) =>
      <button onClick={onClick} style={{padding:"10px 16px",borderRadius:12,fontSize:14,
        cursor:"pointer",border:`2px solid ${active?ac:T.border}`,
        background:active?ab:T.white,color:active?ac:T.slate,
        fontWeight:500,transition:"all .15s"}}>{children}</button>;

    // ── Roles ────────────────────────────────────────────────────────────────
    const ROLES = [
      {id:"young-person", label:"I'm a young person",    emoji:"🌱", desc:"Tell us what matters to you",        colour:T.teal},
      {id:"parent",       label:"I'm a parent or carer", emoji:"🏡", desc:"Stay in the loop, have your say",    colour:"#4A7C7C"},
      {id:"practitioner", label:"I'm a practitioner",    emoji:"🧭", desc:"See your matches and respond",       colour:"#7A6B4A"},
      {id:"commissioner", label:"I'm a commissioner",    emoji:"📋", desc:"Track referrals and outcomes",       colour:"#5A4A7C"},
      {id:"eic",          label:"I'm an EIC",            emoji:"⚡", desc:"Run the matching engine",            colour:T.coral},
    ];

    function RoleSelector({onSelect}) {
      return <div style={{maxWidth:700,margin:"0 auto",padding:"36px 20px"}} className="fu">
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:36,marginBottom:10}}>🔗</div>
          <div className="fr" style={{fontSize:30,fontWeight:600,color:T.teal,marginBottom:8}}>Find your match</div>
          <div style={{fontSize:15,color:T.muted,maxWidth:420,margin:"0 auto"}}>
            Nudge connects young people with the right practitioner — and gives everyone a voice in how that happens.
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12}}>
          {ROLES.map(r =>
            <Card key={r.id} hoverable onClick={()=>onSelect(r.id)} style={{textAlign:"center",padding:22}}>
              <div style={{fontSize:28,marginBottom:10}}>{r.emoji}</div>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4,color:r.colour}}>{r.label}</div>
              <div style={{fontSize:12,color:T.muted}}>{r.desc}</div>
            </Card>)}
        </div>
        <div style={{textAlign:"center",fontSize:12,color:T.muted,marginTop:24}}>
          Prototype v0.1 — internal concept. All names and data are fictional.
        </div>
      </div>;
    }

    // ── Young Person ─────────────────────────────────────────────────────────
    function YoungPersonFlow({onBack}) {
      const [step,setStep]   = useState(0);
      const [prefs,setPrefs] = useState({interests:[],locations:[],challenges:[],style:null});
      const [matched,setMatched] = useState(null);
      const [resp,setResp]   = useState(null);

      const toggle = (key,val) => setPrefs(p => ({
        ...p, [key]: p[key].includes(val) ? p[key].filter(x=>x!==val) : [...p[key],val]
      }));

      const compute = () => [...PRACTITIONERS].map(pr => {
        let s=0;
        prefs.interests.forEach(i=>{if(pr.interests.includes(i))s+=20});
        prefs.locations.forEach(l=>{if(pr.locations.includes(l))s+=15});
        if(pr.style===prefs.style)s+=25;
        return {...pr,ls:s};
      }).sort((a,b)=>b.ls-a.ls)[0];

      const STEPS = [
        {title:"What do you enjoy?",          sub:"Pick as many as you like. No wrong answers.",                      emoji:"🎉", opts:INTERESTS,  key:"interests",  ac:T.teal,    ab:T.tealXL},
        {title:"Where do you feel comfortable?", sub:"Where would you like to meet your practitioner?",               emoji:"🌍", opts:LOCATIONS,  key:"locations",  ac:T.teal,    ab:T.tealXL},
        {title:"What's been hard lately?",    sub:"You don't have to share everything. Just what feels right.",       emoji:"💙", opts:CHALLENGES, key:"challenges", ac:T.coral,   ab:"#FEF0EC"},
        {title:"What kind of person helps you most?", sub:"There's no right answer — just what feels true for you.", emoji:"🧭", opts:STYLES,     key:"style",      ac:"#B07A20", ab:"#FEF5E7"},
      ];

      if(resp==="yes") return (
        <div style={{maxWidth:480,margin:"0 auto",padding:"36px 20px",textAlign:"center"}} className="pop">
          <div style={{fontSize:56,marginBottom:12}}>🎉</div>
          <div className="fr" style={{fontSize:26,fontWeight:600,color:T.green,marginBottom:10}}>Match confirmed!</div>
          <p style={{color:T.muted,marginBottom:20}}>{matched.name} has been notified. Your EIC will be in touch to arrange the first session. No rush — you're in control.</p>
          <Card style={{textAlign:"left",marginBottom:20}}>
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
              <Avatar initial={matched.initial} colour={matched.colour} size={52}/>
              <div><div style={{fontWeight:700,fontSize:17}}>{matched.name}</div><div style={{fontSize:12,color:T.muted}}>{matched.region}</div></div>
            </div>
            <div style={{padding:10,background:T.tealXL,borderRadius:8,fontSize:13,color:T.teal,fontStyle:"italic"}}>
              "{matched.testimonial.split('"')[1]}"
            </div>
          </Card>
          <Btn onClick={onBack}>Back to start</Btn>
        </div>
      );

      if(resp==="pass") return (
        <div style={{maxWidth:420,margin:"0 auto",padding:"36px 20px",textAlign:"center"}} className="fu">
          <div style={{fontSize:40,marginBottom:12}}>💬</div>
          <div className="fr" style={{fontSize:22,fontWeight:600,color:T.slate,marginBottom:10}}>That's completely fine.</div>
          <p style={{color:T.muted,marginBottom:20}}>Your EIC will look at other options. Would you like to tell us anything that might help find a better fit?</p>
          <textarea placeholder="Anything you'd like to add? (optional)"
            style={{width:"100%",padding:12,borderRadius:10,border:`2px solid ${T.border}`,
              fontSize:14,minHeight:80,marginBottom:16,resize:"vertical"}}/>
          <Btn onClick={onBack}>Done for now</Btn>
        </div>
      );

      if(matched) {
        const shared = prefs.interests.filter(i=>matched.interests.includes(i));
        return (
          <div style={{maxWidth:480,margin:"0 auto",padding:"36px 20px"}} className="pop">
            <div style={{textAlign:"center",marginBottom:24}}>
              <div style={{fontSize:32,marginBottom:6}}>✨</div>
              <div className="fr" style={{fontSize:24,fontWeight:600,color:T.teal,marginBottom:6}}>We found a match!</div>
              <div style={{fontSize:14,color:T.muted}}>Here's someone we think could be a great fit. You don't have to decide right now.</div>
            </div>
            <Card style={{marginBottom:16}}>
              <div style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:14}}>
                <Avatar initial={matched.initial} colour={matched.colour} size={60}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:20,marginBottom:4}}>{matched.name}</div>
                      <div style={{fontSize:13,color:T.muted}}>{matched.tagline}</div>
                    </div>
                    <Score score={matched.matchScore}/>
                  </div>
                </div>
              </div>
              <p style={{fontSize:14,color:T.slate,lineHeight:1.6,marginBottom:14}}>{matched.bio}</p>
              {shared.length>0 && (
                <div style={{padding:10,background:T.tealXL,borderRadius:8,marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:600,color:T.teal,marginBottom:4}}>Things you have in common 🎯</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {shared.map(i=>{const o=INTERESTS.find(x=>x.id===i);return <span key={i} style={{fontSize:13}}>{o?.e} {o?.label}</span>})}
                  </div>
                </div>
              )}
              <div style={{borderTop:`1px solid ${T.border}`,paddingTop:10,fontSize:12,color:T.muted,fontStyle:"italic"}}>
                {matched.testimonial}
              </div>
            </Card>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <Btn onClick={()=>setResp("yes")}>Yes — this feels right 👍</Btn>
              <Btn variant="outline" onClick={()=>setResp("pass")}>Not quite right</Btn>
            </div>
          </div>
        );
      }

      const s = STEPS[step];
      const isMulti = s.key !== "style";
      return (
        <div style={{maxWidth:520,margin:"0 auto",padding:"36px 20px"}}>
          <Back onClick={onBack}/>
          <Dots total={STEPS.length} current={step}/>
          <div style={{textAlign:"center",marginBottom:28}} key={step} className="fu">
            <div style={{fontSize:32,marginBottom:8}}>{s.emoji}</div>
            <div className="fr" style={{fontSize:22,fontWeight:600,color:T.slate,marginBottom:6}}>{s.title}</div>
            <div style={{fontSize:14,color:T.muted}}>{s.sub}</div>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginBottom:28}}>
            {s.opts.map(o => {
              const active = isMulti ? prefs[s.key].includes(o.id) : prefs[s.key]===o.id;
              return <Chip key={o.id} active={active} ac={s.ac} ab={s.ab}
                onClick={()=>isMulti?toggle(s.key,o.id):setPrefs(p=>({...p,[s.key]:o.id}))}>
                {o.e} {o.label}
              </Chip>;
            })}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <button onClick={()=>setStep(Math.max(0,step-1))}
              style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:13}}>
              {step>0?"← Back":""}
            </button>
            <div style={{display:"flex",gap:8}}>
              <Btn variant="outline" small onClick={()=>step===STEPS.length-1?setMatched(compute()):setStep(step+1)}>Skip →</Btn>
              <Btn small onClick={()=>step===STEPS.length-1?setMatched(compute()):setStep(step+1)}>
                {step===STEPS.length-1?"Find my match ✨":"Next →"}
              </Btn>
            </div>
          </div>
        </div>
      );
    }

    // ── Practitioner ─────────────────────────────────────────────────────────
    function PractitionerFlow({onBack}) {
      const pr = PRACTITIONERS[0];
      const [view,setView] = useState("profile");
      const [resp,setResp] = useState(null);
      const REF = {id:"REF-2026-0441",age:14,needs:["Anxiety","School avoidance","Trust"],
        interests:["Music","Gaming","Animals"],preferredStyle:"Patient and calm",
        preferredLocations:["Home","Outdoors"],region:"North East",days:3};

      if(view==="match") return (
        <div style={{maxWidth:480,margin:"0 auto",padding:"36px 20px"}} className="fu">
          <Back onClick={()=>setView("profile")}/>
          <div style={{textAlign:"center",marginBottom:20}}>
            <Badge colour={T.amber}>New match request</Badge>
            <div className="fr" style={{fontSize:22,fontWeight:600,color:T.slate,marginTop:10}}>{REF.id}</div>
            <div style={{fontSize:14,color:T.muted,marginTop:6}}>The young person's identity stays protected until you both say yes.</div>
          </div>
          <Card style={{marginBottom:16}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              {[{l:"Age",v:REF.age},{l:"Region",v:REF.region},{l:"Days since referral",v:`${REF.days} days`,c:T.coral},{l:"Match score",v:"94%",c:T.green}].map(x=>
                <div key={x.l}><div style={{fontSize:11,color:T.muted,marginBottom:3}}>{x.l}</div><div style={{fontWeight:600,color:x.c||T.slate}}>{x.v}</div></div>)}
            </div>
            <Lbl>Support needs</Lbl>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              {REF.needs.map(n=><Badge key={n} colour={T.coral}>{n}</Badge>)}
            </div>
            <Lbl>Interests (what they told us)</Lbl>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              {REF.interests.map(i=><Badge key={i} colour={T.teal}>{i}</Badge>)}
            </div>
            <div style={{padding:10,background:T.tealXL,borderRadius:8,fontSize:13}}>
              <strong>They'd prefer: </strong>{REF.preferredStyle} — {REF.preferredLocations.join(" or ").toLowerCase()}
            </div>
          </Card>
          {resp
            ? <Card style={{textAlign:"center"}}>
                {resp==="accept"
                  ? <><div style={{fontSize:32,marginBottom:6}}>👋</div><div style={{fontWeight:600,color:T.green,marginBottom:6}}>Great — you've accepted.</div><div style={{fontSize:13,color:T.muted}}>Your EIC will be in touch once parent/carer consent is confirmed.</div></>
                  : <><div style={{fontSize:32,marginBottom:6}}>🙏</div><div style={{fontWeight:600,color:T.muted,marginBottom:6}}>Noted — no problem at all.</div><div style={{fontSize:13,color:T.muted}}>Declined sessions are never held against you.</div></>}
              </Card>
            : <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                <Btn onClick={()=>setResp("accept")}>Accept ✓</Btn>
                <Btn variant="outline" onClick={()=>setResp("decline")}>Not available for this one</Btn>
              </div>}
        </div>
      );

      return (
        <div style={{maxWidth:520,margin:"0 auto",padding:"36px 20px"}} className="fu">
          <Back onClick={onBack}/>
          <div onClick={()=>setView("match")} style={{background:T.amber+"22",border:`2px solid ${T.amber}`,
            borderRadius:12,padding:"12px 16px",marginBottom:20,cursor:"pointer",
            display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <span style={{fontSize:18}}>🔔</span>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>New match request — REF-2026-0441</div>
                <div style={{fontSize:12,color:T.muted}}>North East · 94% match · 3 days since referral</div>
              </div>
            </div>
            <span style={{color:T.amber,fontWeight:600,fontSize:13}}>Review →</span>
          </div>
          <Card>
            <div style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:16}}>
              <Avatar initial={pr.initial} colour={pr.colour} size={60}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div><div style={{fontWeight:700,fontSize:18}}>{pr.name}</div><div style={{fontSize:13,color:T.muted}}>{pr.region} · {pr.availHours}h/week available</div></div>
                  <Badge colour={T.green}>Active</Badge>
                </div>
                <p style={{fontSize:13,color:T.slate,lineHeight:1.6,marginTop:8}}>{pr.bio}</p>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
              <div>
                <Lbl>Specialisms</Lbl>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{pr.specialisms.map(s=><Badge key={s} colour={T.coral}>{s}</Badge>)}</div>
              </div>
              <div>
                <Lbl>Compliance</Lbl>
                {Object.entries(pr.compliance).map(([k,v])=>
                  <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:2}}>
                    <span style={{color:T.muted}}>{k.toUpperCase()}</span>
                    <span style={{color:v==="✓"||v==="Yes"?T.green:T.coral,fontWeight:600}}>{v}</span>
                  </div>)}
              </div>
            </div>
            <Lbl>Cornerstones profile</Lbl>
            {Object.entries(pr.cornerstones).map(([k,v])=><Bar key={k} label={k} value={v}/>)}
          </Card>
        </div>
      );
    }

    // ── Parent ───────────────────────────────────────────────────────────────
    function ParentFlow({onBack}) {
      const pr = PRACTITIONERS[0];
      const [done,setDone] = useState(false);
      const [notes,setNotes] = useState("");

      if(done) return (
        <div style={{maxWidth:420,margin:"0 auto",padding:"36px 20px",textAlign:"center"}} className="pop">
          <div style={{fontSize:48,marginBottom:12}}>✅</div>
          <div className="fr" style={{fontSize:24,fontWeight:600,color:T.green,marginBottom:10}}>Thank you</div>
          <p style={{color:T.muted,marginBottom:20}}>Your consent has been recorded. The EIC will be in touch to arrange the first session. You can pause or stop at any point.</p>
          <Btn onClick={onBack}>Back to start</Btn>
        </div>
      );

      return (
        <div style={{maxWidth:520,margin:"0 auto",padding:"36px 20px"}} className="fu">
          <Back onClick={onBack}/>
          <div className="fr" style={{fontSize:22,fontWeight:600,color:T.slate,marginBottom:6}}>Your child's match</div>
          <p style={{color:T.muted,marginBottom:20,fontSize:14}}>Here's what your child told us they'd like — and the practitioner we're proposing. You have the final say.</p>
          <Card style={{marginBottom:14}}>
            <Lbl>What your child said they'd like</Lbl>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
              {["Music 🎵","Animals 🐾","Gaming 🎮"].map(i=><Badge key={i} colour={T.teal}>{i}</Badge>)}
              {["At home 🏠","Outside 🌳"].map(i=><Badge key={i} colour={T.tealL}>{i}</Badge>)}
              <Badge colour={T.amber}>Patient and calm 🌊</Badge>
            </div>
          </Card>
          <Card style={{marginBottom:14}}>
            <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:12}}>
              <Avatar initial={pr.initial} colour={pr.colour} size={50}/>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:17}}>{pr.name}</div><div style={{fontSize:12,color:T.muted}}>{pr.region}</div></div>
              <Score score={94}/>
            </div>
            <p style={{fontSize:13,lineHeight:1.6,marginBottom:12}}>{pr.bio}</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
              {Object.entries(pr.compliance).map(([k,v])=>
                <div key={k} style={{textAlign:"center",padding:"8px 4px",background:T.tealXL,borderRadius:8}}>
                  <div style={{fontSize:14,marginBottom:2}}>{v==="✓"||v==="Yes"?"✅":"❌"}</div>
                  <div style={{fontSize:10,color:T.muted}}>{k.toUpperCase()}</div>
                </div>)}
            </div>
            <div style={{padding:10,background:T.sand,borderRadius:8,fontSize:12,fontStyle:"italic",color:T.slate}}>{pr.testimonial}</div>
          </Card>
          <Card style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>Is there anything you'd like the team to know?</div>
            <textarea value={notes} onChange={e=>setNotes(e.target.value)}
              placeholder="Any context, preferences or concerns (optional)..."
              style={{width:"100%",padding:10,borderRadius:8,border:`2px solid ${T.border}`,fontSize:13,minHeight:70,resize:"vertical"}}/>
          </Card>
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            <Btn onClick={()=>setDone(true)}>I'm happy to proceed ✓</Btn>
            <Btn variant="outline" onClick={onBack}>I'd like to discuss this first</Btn>
          </div>
          <div style={{fontSize:11,color:T.muted}}>Your consent can be withdrawn at any time. Contact your EIC or email hello@nudgeeducation.co.uk</div>
        </div>
      );
    }

    // ── Commissioner ─────────────────────────────────────────────────────────
    function CommissionerFlow({onBack}) {
      const REFS = [
        {id:"REF-2026-0441",la:"Sunderland City Council", status:"Matching",  days:3, matched:PRACTITIONERS[0].name, score:94},
        {id:"REF-2026-0438",la:"Gateshead Council",        status:"Active",    started:"03/02/2026"},
        {id:"REF-2026-0435",la:"Durham County Council",    status:"Confirmed", matched:PRACTITIONERS[1].name, score:87},
        {id:"REF-2026-0430",la:"Northumberland Council",   status:"Active",    started:"28/01/2026"},
        {id:"REF-2026-0421",la:"Sunderland City Council",  status:"Closed",    outcome:"Re-engaged school", weeks:14},
      ];
      const SC = {Matching:T.amber,Active:T.teal,Confirmed:T.green,Closed:T.muted};

      return (
        <div style={{maxWidth:640,margin:"0 auto",padding:"36px 20px"}} className="fu">
          <Back onClick={onBack}/>
          <div className="fr" style={{fontSize:22,fontWeight:600,color:T.slate,marginBottom:4}}>Commissioner Dashboard</div>
          <div style={{fontSize:13,color:T.muted,marginBottom:24}}>North East region · February 2026</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:24}}>
            {[{l:"Active referrals",v:"12",c:T.teal},{l:"Avg days to match",v:"4.2",c:T.green,s:"↓ from 9.1"},{l:"In matching",v:"3",c:T.amber},{l:"Transitions",v:"34",c:T.teal,s:"this year"}].map(x=>
              <Card key={x.l} style={{textAlign:"center",padding:14}}>
                <div style={{fontSize:26,fontWeight:700,color:x.c,fontFamily:"'Fraunces',serif"}}>{x.v}</div>
                <div style={{fontSize:11,color:T.muted,marginTop:3}}>{x.l}</div>
                {x.s&&<div style={{fontSize:10,color:T.green,marginTop:2}}>{x.s}</div>}
              </Card>)}
          </div>
          <Card style={{marginBottom:16}}>
            <Lbl>Referral tracker</Lbl>
            {REFS.map((r,i)=>
              <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<REFS.length-1?`1px solid ${T.border}`:"none"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:SC[r.status],flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>{r.id}</div>
                  <div style={{fontSize:11,color:T.muted}}>{r.la}</div>
                </div>
                <Badge colour={SC[r.status]}>{r.status}</Badge>
                {r.status==="Matching"&&<div style={{textAlign:"right",fontSize:11}}><div style={{color:T.coral,fontWeight:600}}>{r.days}d</div><div style={{color:T.muted}}>→ {r.matched} ({r.score}%)</div></div>}
                {r.status==="Closed"&&<div style={{textAlign:"right",fontSize:11}}><div style={{color:T.green,fontWeight:600}}>{r.outcome}</div><div style={{color:T.muted}}>{r.weeks}wks</div></div>}
                {r.started&&<div style={{fontSize:11,color:T.muted}}>{r.started}</div>}
              </div>)}
          </Card>
          <Card style={{background:T.tealXL,border:`1px solid ${T.tealL}`}}>
            <div style={{fontWeight:600,color:T.teal,marginBottom:8}}>📊 Matching speed — North East</div>
            <div style={{fontSize:12,color:T.muted,marginBottom:6}}>Current average: 4.2 days referral → match</div>
            <div style={{height:8,borderRadius:999,background:T.white}}>
              <div style={{height:8,borderRadius:999,background:T.green,width:"54%"}}/>
            </div>
            <div style={{fontSize:11,color:T.muted,marginTop:6}}>Target: 3 days · Sector average: 9+ days</div>
          </Card>
        </div>
      );
    }

    // ── EIC ──────────────────────────────────────────────────────────────────
    function EICFlow({onBack}) {
      const [proposed,setProposed] = useState(null);
      const [confirmed,setConfirmed] = useState(false);
      const REF = {id:"REF-2026-0441",age:14,la:"Sunderland City Council",days:3,
        needs:["Anxiety","School avoidance"],interests:["Music","Gaming","Animals"],
        style:"Patient and calm",risk:"Amber"};
      const ranked = PRACTITIONERS.map(p=>({...p,factors:[
        {l:"Geography",  s:p.region==="North East"?25:5,  m:25},
        {l:"Compliance", s:25,                             m:25},
        {l:"Availability",s:p.availHours>10?20:10,        m:20},
        {l:"Specialism", s:p.specialisms.includes("Anxiety")?20:8, m:20},
        {l:"Cornerstones",s:Math.round(p.cornerstones.Connection/5*10), m:10},
      ]})).sort((a,b)=>b.matchScore-a.matchScore);

      if(confirmed) return (
        <div style={{maxWidth:440,margin:"0 auto",padding:"36px 20px",textAlign:"center"}} className="pop">
          <div style={{fontSize:48,marginBottom:12}}>📨</div>
          <div className="fr" style={{fontSize:24,fontWeight:600,color:T.teal,marginBottom:10}}>Proposed!</div>
          <p style={{color:T.muted,marginBottom:6}}><strong>{proposed?.name}</strong> has been notified. Awaiting their response.</p>
          <p style={{color:T.muted,fontSize:13,marginBottom:24}}>Parent/carer consent notification also sent. Clock: <strong style={{color:T.coral}}>3 days → target 3 days</strong></p>
          <div style={{textAlign:"left",position:"relative",paddingLeft:20,marginBottom:20}}>
            <div style={{position:"absolute",left:7,top:8,bottom:8,width:2,background:T.border}}/>
            {[
              {l:"Referral received",                time:"21/02/2026",done:true},
              {l:"Young person preferences captured",time:"22/02/2026",done:true},
              {l:"Match proposed by EIC",            time:"24/02/2026",done:true},
              {l:"Practitioner response",            time:"Awaiting",  active:true},
              {l:"Parent/carer consent",             time:"Awaiting"},
              {l:"Session 1 booked",                 time:"Pending"},
            ].map((x,i)=>
              <div key={i} style={{display:"flex",gap:10,marginBottom:14}}>
                <div style={{width:14,height:14,borderRadius:"50%",background:x.done?T.green:x.active?T.teal:T.border,
                  border:"2px solid white",flexShrink:0,marginTop:2,boxShadow:x.active?`0 0 0 3px ${T.tealXL}`:"none"}}/>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:x.done?T.slate:x.active?T.teal:T.muted}}>{x.l}</div>
                  <div style={{fontSize:11,color:T.muted}}>{x.time}</div>
                </div>
              </div>)}
          </div>
          <Btn onClick={onBack}>Back to start</Btn>
        </div>
      );

      return (
        <div style={{maxWidth:640,margin:"0 auto",padding:"36px 20px"}} className="fu">
          <Back onClick={onBack}/>
          <div className="fr" style={{fontSize:22,fontWeight:600,color:T.slate,marginBottom:8}}>Matching engine</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:20}}>
            <Badge colour={T.coral}>{REF.id}</Badge>
            <span style={{fontSize:13,color:T.muted}}>{REF.la} · Age {REF.age}</span>
            <Badge colour={T.amber}>Risk: {REF.risk}</Badge>
            <span style={{color:T.coral,fontSize:12,fontWeight:600}}>⏱ {REF.days} days since referral</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
            <Card style={{padding:14}}><Lbl>Needs</Lbl><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{REF.needs.map(n=><Badge key={n} colour={T.coral}>{n}</Badge>)}</div></Card>
            <Card style={{padding:14}}><Lbl>Young person said</Lbl><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{REF.interests.map(n=><Badge key={n} colour={T.teal}>{n}</Badge>)}<Badge colour={T.amber}>{REF.style}</Badge></div></Card>
          </div>
          <Lbl>Ranked shortlist — transparency view</Lbl>
          {ranked.map((pr,i)=>
            <div key={pr.id} onClick={()=>setProposed(pr)} style={{marginBottom:10,cursor:"pointer",
              border:`2px solid ${proposed?.id===pr.id?T.teal:T.border}`,borderRadius:12,padding:14,
              background:proposed?.id===pr.id?T.tealXL:T.white,transition:"all .2s"}}>
              <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
                <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,
                  background:i===0?T.green:i===1?T.amber:T.border,
                  display:"flex",alignItems:"center",justifyContent:"center",color:T.white,fontSize:11,fontWeight:700}}>
                  {i+1}
                </div>
                <Avatar initial={pr.initial} colour={pr.colour} size={36}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14}}>{pr.name} · {pr.region}</div>
                  <div style={{fontSize:11,color:T.muted}}>{pr.availHours}h available · Online: {pr.compliance.online}</div>
                </div>
                <Score score={pr.matchScore}/>
              </div>
              <div style={{display:"flex",gap:6}}>
                {pr.factors.map(f=>
                  <div key={f.l} style={{flex:"1 1 60px",textAlign:"center",padding:"5px 4px",background:T.cream,borderRadius:6}}>
                    <div style={{fontSize:10,color:T.muted,marginBottom:2}}>{f.l}</div>
                    <div style={{fontWeight:600,fontSize:12,color:f.s/f.m>.8?T.green:f.s/f.m>.5?T.amber:T.coral}}>{f.s}/{f.m}</div>
                  </div>)}
              </div>
            </div>)}
          <div style={{display:"flex",gap:10,alignItems:"center",marginTop:4}}>
            <Btn onClick={()=>proposed&&setConfirmed(true)} disabled={!proposed}>
              Propose {proposed?proposed.name:"selected practitioner"} →
            </Btn>
            {!proposed&&<span style={{fontSize:12,color:T.muted}}>Select a practitioner above</span>}
          </div>
          <div style={{fontSize:11,color:T.muted,marginTop:10}}>
            All decisions logged with your ID and timestamp. You can override the ranking — just add a note explaining why.
          </div>
        </div>
      );
    }

    // ── App root ─────────────────────────────────────────────────────────────
    function App() {
      const [role,setRole] = useState(null);
      return (
        <div style={{minHeight:"100vh",background:T.cream}}>
          <div style={{background:T.teal,padding:"12px 20px",display:"flex",
            justifyContent:"space-between",alignItems:"center",
            position:"sticky",top:0,zIndex:100}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:28,height:28,borderRadius:7,background:"rgba(255,255,255,.15)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🔗</div>
              <span className="fr" style={{color:"white",fontSize:17,fontWeight:600}}>Nudge Match</span>
              <span style={{fontSize:10,color:"rgba(255,255,255,.6)",padding:"2px 8px",
                background:"rgba(255,255,255,.1)",borderRadius:999}}>prototype v0.1</span>
            </div>
            {role && <button onClick={()=>setRole(null)} style={{background:"rgba(255,255,255,.15)",
              border:"none",color:"white",padding:"5px 12px",borderRadius:999,cursor:"pointer",fontSize:12}}>
              Switch role
            </button>}
          </div>
          {!role             && <RoleSelector      onSelect={setRole}/>}
          {role==="young-person"  && <YoungPersonFlow   onBack={()=>setRole(null)}/>}
          {role==="practitioner"  && <PractitionerFlow  onBack={()=>setRole(null)}/>}
          {role==="parent"        && <ParentFlow         onBack={()=>setRole(null)}/>}
          {role==="commissioner"  && <CommissionerFlow   onBack={()=>setRole(null)}/>}
          {role==="eic"           && <EICFlow            onBack={()=>setRole(null)}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
