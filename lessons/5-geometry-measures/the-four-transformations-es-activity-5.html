<!DOCTYPE html>
<html lang="en">
<head>

    <title>Cayley Tables - Modular Arithmetic Explorer</title>

    <style>
        .correct { background-color: #dcfce7 !important; border-color: #16a34a !important; }
        .incorrect { background-color: #fef2f2 !important; border-color: #dc2626 !important; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .bounce { animation: bounce 0.5s ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-800 mb-2">Cayley Tables Explorer</h1>
            <p class="text-lg text-gray-700">Discover modular arithmetic and group properties</p>
        </div>

        <!-- Operation Selector -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Choose Your Operation</h2>
            <div class="flex gap-4">
                <button id="additionBtn" class="px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors font-medium">
                    Addition (mod 4)
                </button>
                <button id="multiplicationBtn" class="px-6 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors font-medium">
                    Multiplication (mod 4)
                </button>
            </div>
            <p id="operationDesc" class="mt-3 text-gray-600">Fill in the table for addition modulo 4: (a + b) mod 4</p>
        </div>

        <!-- Cayley Table -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Cayley Table</h2>
            <div class="overflow-x-auto">
                <table class="mx-auto border-collapse">
                    <tr>
                        <td class="w-12 h-12 text-center font-bold text-lg text-indigo-600">⊕</td>
                        <td class="w-12 h-12 text-center font-bold text-lg bg-indigo-100 border-2 border-indigo-300">0</td>
                        <td class="w-12 h-12 text-center font-bold text-lg bg-indigo-100 border-2 border-indigo-300">1</td>
                        <td class="w-12 h-12 text-center font-bold text-lg bg-indigo-100 border-2 border-indigo-300">2</td>
                        <td class="w-12 h-12 text-center font-bold text-lg bg-indigo-100 border-2 border-indigo-300">3</td>
                    </tr>
                    <tr>
                        <td class="w-12 h-12 text-center font-bold text-lg bg-indigo-100 border-2 border-indigo-300">0</td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="0" data-col="0"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="0" data-col="1"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="0" data-col="2"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="0" data-col="3"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                    </tr>
                    <tr>
                        <td class="w-12 h-12 text-center font-bold text-lg bg-indigo-100 border-2 border-indigo-300">1</td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="1" data-col="0"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="1" data-col="1"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="1" data-col="2"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="1" data-col="3"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                    </tr>
                    <tr>
                        <td class="w-12 h-12 text-center font-bold text-lg bg-indigo-100 border-2 border-indigo-300">2</td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="2" data-col="0"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="2" data-col="1"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="2" data-col="2"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="2" data-col="3"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                    </tr>
                    <tr>
                        <td class="w-12 h-12 text-center font-bold text-lg bg-indigo-100 border-2 border-indigo-300">3</td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="3" data-col="0"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="3" data-col="1"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="3" data-col="2"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                        <td class="w-12 h-12 p-1"><select class="w-full h-full text-center border-2 border-gray-300 rounded focus:border-blue-500 focus:outline-none" data-row="3" data-col="3"><option value="">?</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></td>
                    </tr>
                </table>
            </div>
            <div class="text-center mt-4">
                <button id="checkAnswers" class="px-6 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors font-medium">
                    Check Answers
                </button>
            </div>
            <div id="tableResult" class="mt-4 text-center font-medium"></div>
        </div>

        <!-- Group Properties -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Group Properties</h2>
            <p class="text-gray-600 mb-4">After completing the table, check which properties this operation satisfies:</p>
            
            <div class="space-y-3">
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="checkbox" id="closure" class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                    <span class="text-gray-700"><strong>Closure:</strong> The result of any operation stays within the set {0, 1, 2, 3}</span>
                </label>
                
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="checkbox" id="identity" class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                    <span class="text-gray-700"><strong>Identity:</strong> There exists an element that leaves others unchanged</span>
                </label>
                
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="checkbox" id="inverses" class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                    <span class="text-gray-700"><strong>Inverses:</strong> Every element has an inverse that gives the identity</span>
                </label>
                
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="checkbox" id="associativity" class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                    <span class="text-gray-700"><strong>Associativity:</strong> (a ⊕ b) ⊕ c = a ⊕ (b ⊕ c) for all elements</span>
                </label>
            </div>
            
            <div class="text-center mt-6">
                <button id="submitProperties" class="px-6 py-3 bg-purple-500 text-white rounded-lg hover:bg-purple-600 transition-colors font-medium">
                    Submit Properties
                </button>
            </div>
            <div id="propertiesResult" class="mt-4 text-center font-medium"></div>
        </div>

        <!-- Reset Button -->
        <div class="text-center">
            <button id="resetAll" class="px-6 py-3 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors font-medium">
                Reset Activity
            </button>
        </div>
    </div>

    <script>
        let currentOperation = 'addition';
        let tableCorrect = false;

        // Operation tables
        const additionTable = [
            [0, 1, 2, 3],
            [1, 2, 3, 0],
            [2, 3, 0, 1],
            [3, 0, 1, 2]
        ];

        const multiplicationTable = [
            [0, 0, 0, 0],
            [0, 1, 2, 3],
            [0, 2, 0, 2],
            [0, 3, 2, 1]
        ];

        // Group properties for each operation
        const groupProperties = {
            addition: { closure: true, identity: true, inverses: true, associativity: true },
            multiplication: { closure: true, identity: false, inverses: false, associativity: true }
        };

        // Operation buttons
        document.getElementById('additionBtn').addEventListener('click', () => setOperation('addition'));
        document.getElementById('multiplicationBtn').addEventListener('click', () => setOperation('multiplication'));

        function setOperation(operation) {
            currentOperation = operation;
            
            // Update button styles
            const addBtn = document.getElementById('additionBtn');
            const mulBtn = document.getElementById('multiplicationBtn');
            
            if (operation === 'addition') {
                addBtn.className = 'px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors font-medium';
                mulBtn.className = 'px-6 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors font-medium';
                document.getElementById('operationDesc').textContent = 'Fill in the table for addition modulo 4: (a + b) mod 4';
            } else {
                addBtn.className = 'px-6 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors font-medium';
                mulBtn.className = 'px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors font-medium';
                document.getElementById('operationDesc').textContent = 'Fill in the table for multiplication modulo 4: (a × b) mod 4';
            }
            
            resetTable();
        }

        // Check answers
        document.getElementById('checkAnswers').addEventListener('click', checkTableAnswers);

        function checkTableAnswers() {
            const selects = document.querySelectorAll('select[data-row]');
            const correctTable = currentOperation === 'addition' ? additionTable : multiplicationTable;
            let allCorrect = true;
            let allFilled = true;

            selects.forEach(select => {
                const row = parseInt(select.dataset.row);
                const col = parseInt(select.dataset.col);
                const userAnswer = select.value;
                const correctAnswer = correctTable[row][col].toString();

                // Remove previous styling
                select.classList.remove('correct', 'incorrect');

                if (userAnswer === '') {
                    allFilled = false;
                    return;
                }

                if (userAnswer === correctAnswer) {
                    select.classList.add('correct');
                } else {
                    select.classList.add('incorrect');
                    allCorrect = false;
                }
            });

            const resultDiv = document.getElementById('tableResult');
            
            if (!allFilled) {
                resultDiv.innerHTML = '<span class="text-yellow-600">⚠️ Please fill in all cells before checking</span>';
                resultDiv.className = 'mt-4 text-center font-medium fade-in';
                tableCorrect = false;
            } else if (allCorrect) {
                resultDiv.innerHTML = '<span class="text-green-600">🎉 Excellent! Your Cayley table is correct!</span>';
                resultDiv.className = 'mt-4 text-center font-medium fade-in bounce';
                tableCorrect = true;
            } else {
                resultDiv.innerHTML = '<span class="text-red-600">❌ Some answers are incorrect. Check the highlighted cells.</span>';
                resultDiv.className = 'mt-4 text-center font-medium fade-in';
                tableCorrect = false;
            }
        }

        // Submit properties
        document.getElementById('submitProperties').addEventListener('click', checkProperties);

        function checkProperties() {
            if (!tableCorrect) {
                document.getElementById('propertiesResult').innerHTML = '<span class="text-yellow-600">⚠️ Please complete and check the table first</span>';
                document.getElementById('propertiesResult').className = 'mt-4 text-center font-medium fade-in';
                return;
            }

            const properties = ['closure', 'identity', 'inverses', 'associativity'];
            const correctProperties = groupProperties[currentOperation];
            let allCorrect = true;

            properties.forEach(prop => {
                const checkbox = document.getElementById(prop);
                const isChecked = checkbox.checked;
                const shouldBeChecked = correctProperties[prop];

                if (isChecked !== shouldBeChecked) {
                    allCorrect = false;
                }
            });

            const resultDiv = document.getElementById('propertiesResult');
            
            if (allCorrect) {
                const isGroup = Object.values(correctProperties).every(val => val);
                if (isGroup) {
                    resultDiv.innerHTML = `<span class="text-green-600">✅ Yes! This forms a mathematical group under mod 4 ${currentOperation}.</span>`;
                } else {
                    resultDiv.innerHTML = `<span class="text-blue-600">✅ Correct! This does NOT form a group under mod 4 ${currentOperation}.</span>`;
                }
                resultDiv.className = 'mt-4 text-center font-medium fade-in bounce';
            } else {
                resultDiv.innerHTML = '<span class="text-red-600">❌ Not all group properties are identified correctly. Review your answers.</span>';
                resultDiv.className = 'mt-4 text-center font-medium fade-in';
            }
        }

        // Reset functionality
        document.getElementById('resetAll').addEventListener('click', resetAll);

        function resetTable() {
            const selects = document.querySelectorAll('select[data-row]');
            selects.forEach(select => {
                select.value = '';
                select.classList.remove('correct', 'incorrect');
            });
            
            document.getElementById('tableResult').innerHTML = '';
            tableCorrect = false;
        }

        function resetAll() {
            resetTable();
            
            // Reset checkboxes
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = false);
            
            // Clear results
            document.getElementById('propertiesResult').innerHTML = '';
            
            // Reset to addition
            setOperation('addition');
        }

        // Initialize with addition
        setOperation('addition');
    </script>
