<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koch Snowflake Generator</title>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    body {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100%;
      padding: 20px;
    }

    * {
      box-sizing: border-box;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      padding: 30px;
      max-width: 900px;
      width: 100%;
    }

    h1 {
      color: #1565c0;
      text-align: center;
      margin: 0 0 10px 0;
      font-size: 32px;
    }

    .subtitle {
      color: #64b5f6;
      text-align: center;
      margin: 0 0 25px 0;
      font-size: 16px;
    }

    .canvas-container {
      background: #f5f5f5;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
      position: relative;
    }

    canvas {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 20px;
    }

    .slider-container {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
    }

    .slider-label {
      color: #1565c0;
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
    }

    .iteration-value {
      background: #1565c0;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      border-radius: 5px;
      background: #ddd;
      outline: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #1565c0;
      cursor: pointer;
      transition: background 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #0d47a1;
    }

    input[type="range"]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #1565c0;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    input[type="range"]::-moz-range-thumb:hover {
      background: #0d47a1;
    }

    .button-group {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    button {
      background: #1565c0;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(21, 101, 192, 0.3);
    }

    button:hover {
      background: #0d47a1;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(21, 101, 192, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: #64b5f6;
    }

    button.secondary:hover {
      background: #42a5f5;
    }

    .info-panel {
      background: #e3f2fd;
      padding: 20px;
      border-radius: 12px;
      border-left: 4px solid #1565c0;
    }

    .info-title {
      color: #1565c0;
      font-weight: 600;
      margin: 0 0 12px 0;
      font-size: 18px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .info-item {
      background: white;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
    }

    .info-label {
      color: #64b5f6;
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 12px;
      text-transform: uppercase;
    }

    .info-value {
      color: #1565c0;
      font-weight: 700;
      font-size: 18px;
    }

    .tooltip {
      position: absolute;
      background: rgba(21, 101, 192, 0.95);
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
      max-width: 250px;
      text-align: center;
    }

    .tooltip.show {
      opacity: 1;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 24px;
      }

      .button-group {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="https://cdn.tailwindcss.com" type="text/javascript"></script>

 <body>
  <div class="container">
   <h1 id="main-title">Koch Snowflake Generator</h1>
   <p class="subtitle" id="subtitle">Explore the beauty of fractals</p>
   <div class="canvas-container">
    <canvas id="snowflake-canvas" width="600" height="600"></canvas>
    <div class="tooltip" id="tooltip">
     All triangles added are congruent equilateral triangles!
    </div>
   </div>
   <div class="controls">
    <div class="slider-container">
     <div class="slider-label"><span id="iteration-label">Iteration Level</span> <span class="iteration-value" id="current-iteration">0</span>
     </div><input type="range" id="iteration-slider" min="0" max="5" value="0" step="1">
    </div>
    <div class="button-group"><button id="next-btn">Next Iteration</button> <button id="reset-btn" class="secondary">Reset</button>
    </div>
   </div>
   <div class="info-panel">
    <h3 class="info-title" id="info-title">Fractal Properties</h3>
    <div class="info-grid">
     <div class="info-item">
      <div class="info-label">
       Current Iteration
      </div>
      <div class="info-value" id="info-iteration">
       0
      </div>
     </div>
     <div class="info-item">
      <div class="info-label">
       Number of Segments
      </div>
      <div class="info-value" id="info-segments">
       3
      </div>
     </div>
     <div class="info-item">
      <div class="info-label">
       Perimeter Growth
      </div>
      <div class="info-value" id="info-perimeter">
       1.00×
      </div>
     </div>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      main_title: "Koch Snowflake Generator",
      subtitle: "Explore the beauty of fractals",
      iteration_label: "Iteration Level",
      next_button: "Next Iteration",
      reset_button: "Reset",
      info_title: "Fractal Properties",
      background_color: "#e3f2fd",
      secondary_surface_color: "#ffffff",
      text_color: "#1565c0",
      primary_action_color: "#1565c0",
      secondary_action_color: "#64b5f6",
      font_family: "Segoe UI",
      font_size: 16
    };

    let config = { ...defaultConfig };

    const canvas = document.getElementById('snowflake-canvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('iteration-slider');
    const nextBtn = document.getElementById('next-btn');
    const resetBtn = document.getElementById('reset-btn');
    const tooltip = document.getElementById('tooltip');

    let currentIteration = 0;
    let animatingTooltip = false;

    function drawKochSnowflake(iteration) {
      const size = Math.min(canvas.width, canvas.height);
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const radius = size * 0.35;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = config.primary_action_color || defaultConfig.primary_action_color;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      const angle = Math.PI / 6;
      const points = [
        { x: centerX + radius * Math.cos(angle + Math.PI * 2 / 3 * 0), y: centerY + radius * Math.sin(angle + Math.PI * 2 / 3 * 0) },
        { x: centerX + radius * Math.cos(angle + Math.PI * 2 / 3 * 1), y: centerY + radius * Math.sin(angle + Math.PI * 2 / 3 * 1) },
        { x: centerX + radius * Math.cos(angle + Math.PI * 2 / 3 * 2), y: centerY + radius * Math.sin(angle + Math.PI * 2 / 3 * 2) }
      ];

      for (let i = 0; i < 3; i++) {
        const start = points[i];
        const end = points[(i + 1) % 3];
        drawKochCurve(start.x, start.y, end.x, end.y, iteration);
      }

      updateInfo(iteration);
    }

    function drawKochCurve(x1, y1, x2, y2, iteration) {
      if (iteration === 0) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        return;
      }

      const dx = x2 - x1;
      const dy = y2 - y1;

      const x3 = x1 + dx / 3;
      const y3 = y1 + dy / 3;

      const x5 = x1 + 2 * dx / 3;
      const y5 = y1 + 2 * dy / 3;

      const angle = Math.atan2(dy, dx) - Math.PI / 3;
      const length = Math.sqrt(dx * dx + dy * dy) / 3;
      const x4 = x3 + length * Math.cos(angle);
      const y4 = y3 + length * Math.sin(angle);

      drawKochCurve(x1, y1, x3, y3, iteration - 1);
      drawKochCurve(x3, y3, x4, y4, iteration - 1);
      drawKochCurve(x4, y4, x5, y5, iteration - 1);
      drawKochCurve(x5, y5, x2, y2, iteration - 1);
    }

    function updateInfo(iteration) {
      const segments = 3 * Math.pow(4, iteration);
      const perimeterGrowth = Math.pow(4/3, iteration);
      
      document.getElementById('info-iteration').textContent = iteration;
      document.getElementById('info-segments').textContent = segments.toLocaleString();
      document.getElementById('info-perimeter').textContent = perimeterGrowth.toFixed(2) + '×';
      document.getElementById('current-iteration').textContent = iteration;
    }

    function showTooltip() {
      if (currentIteration > 0 && !animatingTooltip) {
        animatingTooltip = true;
        tooltip.classList.add('show');
        setTimeout(() => {
          tooltip.classList.remove('show');
          animatingTooltip = false;
        }, 3000);
      }
    }

    slider.addEventListener('input', (e) => {
      currentIteration = parseInt(e.target.value);
      drawKochSnowflake(currentIteration);
      if (currentIteration > 0) {
        showTooltip();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentIteration < 5) {
        currentIteration++;
        slider.value = currentIteration;
        drawKochSnowflake(currentIteration);
        showTooltip();
      }
    });

    resetBtn.addEventListener('click', () => {
      currentIteration = 0;
      slider.value = 0;
      drawKochSnowflake(0);
    });

    window.addEventListener('resize', () => {
      drawKochSnowflake(currentIteration);
    });

    function onConfigChange(newConfig) {
      const baseSize = newConfig.font_size || defaultConfig.font_size;
      const customFont = newConfig.font_family || defaultConfig.font_family;
      const baseFontStack = 'Segoe UI, Tahoma, Geneva, Verdana, sans-serif';
      
      document.getElementById('main-title').textContent = newConfig.main_title || defaultConfig.main_title;
      document.getElementById('main-title').style.fontSize = `${baseSize * 2}px`;
      document.getElementById('main-title').style.fontFamily = `${customFont}, ${baseFontStack}`;
      document.getElementById('main-title').style.color = newConfig.text_color || defaultConfig.text_color;
      
      document.getElementById('subtitle').textContent = newConfig.subtitle || defaultConfig.subtitle;
      document.getElementById('subtitle').style.fontSize = `${baseSize}px`;
      document.getElementById('subtitle').style.fontFamily = `${customFont}, ${baseFontStack}`;
      document.getElementById('subtitle').style.color = newConfig.secondary_action_color || defaultConfig.secondary_action_color;
      
      document.getElementById('iteration-label').textContent = newConfig.iteration_label || defaultConfig.iteration_label;
      document.getElementById('iteration-label').style.fontSize = `${baseSize}px`;
      document.getElementById('iteration-label').style.fontFamily = `${customFont}, ${baseFontStack}`;
      document.getElementById('iteration-label').style.color = newConfig.text_color || defaultConfig.text_color;
      
      document.getElementById('next-btn').textContent = newConfig.next_button || defaultConfig.next_button;
      document.getElementById('next-btn').style.fontSize = `${baseSize}px`;
      document.getElementById('next-btn').style.fontFamily = `${customFont}, ${baseFontStack}`;
      document.getElementById('next-btn').style.background = newConfig.primary_action_color || defaultConfig.primary_action_color;
      
      document.getElementById('reset-btn').textContent = newConfig.reset_button || defaultConfig.reset_button;
      document.getElementById('reset-btn').style.fontSize = `${baseSize}px`;
      document.getElementById('reset-btn').style.fontFamily = `${customFont}, ${baseFontStack}`;
      document.getElementById('reset-btn').style.background = newConfig.secondary_action_color || defaultConfig.secondary_action_color;
      
      document.getElementById('info-title').textContent = newConfig.info_title || defaultConfig.info_title;
      document.getElementById('info-title').style.fontSize = `${baseSize * 1.125}px`;
      document.getElementById('info-title').style.fontFamily = `${customFont}, ${baseFontStack}`;
      document.getElementById('info-title').style.color = newConfig.text_color || defaultConfig.text_color;
      
      document.body.style.background = `linear-gradient(135deg, ${newConfig.background_color || defaultConfig.background_color} 0%, ${newConfig.secondary_action_color || defaultConfig.secondary_action_color} 100%)`;
      document.querySelector('.container').style.background = newConfig.secondary_surface_color || defaultConfig.secondary_surface_color;
      
      const allLabels = document.querySelectorAll('.info-label');
      allLabels.forEach(label => {
        label.style.fontSize = `${baseSize * 0.75}px`;
        label.style.fontFamily = `${customFont}, ${baseFontStack}`;
        label.style.color = newConfig.secondary_action_color || defaultConfig.secondary_action_color;
      });
      
      const allValues = document.querySelectorAll('.info-value');
      allValues.forEach(value => {
        value.style.fontSize = `${baseSize * 1.125}px`;
        value.style.fontFamily = `${customFont}, ${baseFontStack}`;
        value.style.color = newConfig.text_color || defaultConfig.text_color;
      });
      
      drawKochSnowflake(currentIteration);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig: defaultConfig,
        onConfigChange: async (newConfig) => {
          config = { ...config, ...newConfig };
          onConfigChange(config);
        },
        mapToCapabilities: (cfg) => ({
          recolorables: [
            {
              get: () => cfg.background_color || defaultConfig.background_color,
              set: (value) => {
                cfg.background_color = value;
                window.elementSdk.setConfig({ background_color: value });
              }
            },
            {
              get: () => cfg.secondary_surface_color || defaultConfig.secondary_surface_color,
              set: (value) => {
                cfg.secondary_surface_color = value;
                window.elementSdk.setConfig({ secondary_surface_color: value });
              }
            },
            {
              get: () => cfg.text_color || defaultConfig.text_color,
              set: (value) => {
                cfg.text_color = value;
                window.elementSdk.setConfig({ text_color: value });
              }
            },
            {
              get: () => cfg.primary_action_color || defaultConfig.primary_action_color,
              set: (value) => {
                cfg.primary_action_color = value;
                window.elementSdk.setConfig({ primary_action_color: value });
              }
            },
            {
              get: () => cfg.secondary_action_color || defaultConfig.secondary_action_color,
              set: (value) => {
                cfg.secondary_action_color = value;
                window.elementSdk.setConfig({ secondary_action_color: value });
              }
            }
          ],
          borderables: [],
          fontEditable: {
            get: () => cfg.font_family || defaultConfig.font_family,
            set: (value) => {
              cfg.font_family = value;
              window.elementSdk.setConfig({ font_family: value });
            }
          },
          fontSizeable: {
            get: () => cfg.font_size || defaultConfig.font_size,
            set: (value) => {
              cfg.font_size = value;
              window.elementSdk.setConfig({ font_size: value });
            }
          }
        }),
        mapToEditPanelValues: (cfg) => new Map([
          ["main_title", cfg.main_title || defaultConfig.main_title],
          ["subtitle", cfg.subtitle || defaultConfig.subtitle],
          ["iteration_label", cfg.iteration_label || defaultConfig.iteration_label],
          ["next_button", cfg.next_button || defaultConfig.next_button],
          ["reset_button", cfg.reset_button || defaultConfig.reset_button],
          ["info_title", cfg.info_title || defaultConfig.info_title]
        ])
      });
    }

    drawKochSnowflake(0);
  </script>
